<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link
			rel="icon"
			type="image/svg+xml"
			href="/images/favicon.svg"
			media="(prefers-color-scheme: light)"
		>
		<link
			rel="icon"
			type="image/svg+xml"
			href="/images/favicon_light.svg"
			media="(prefers-color-scheme: dark)"
		>
		<link
			rel="icon"
			type="image/png"
			href="/images/favicon.png"
			media="(prefers-color-scheme: light)"
		>
		<link
			rel="icon"
			type="image/png"
			href="/images/favicon_light.png"
			media="(prefers-color-scheme: dark)"
		>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!-- Primary Meta Tags -->
		<title>PWA App</title>
		<meta name="title" content="PWA App">
		<meta
			name="description"
			content="PWA Application UI built with Shadcn and Vite."
		>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://shadcn-admin.netlify.app">
		<meta property="og:title" content="PWA APP">
		<meta
			property="og:description"
			content="PWA Application UI built with Shadcn and Vite."
		>
		<meta
			property="og:image"
			content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
		>

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image">
		<meta property="twitter:url" content="https://shadcn-admin.netlify.app">
		<meta property="twitter:title" content="Donation Client">
		<meta
			property="twitter:description"
			content="PWA Application UI built with Shadcn and Vite."
		>
		<meta
			property="twitter:image"
			content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
		>

		<meta name="theme-color" content="#fff">
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
